host = 127.0.0.1
port = 8080
dir = public
php_root = public
# Use an absolute php-cgi path if it is not available on the server PATH.
php_bin = /opt/homebrew/bin/php-cgi
# The themed phpinfo page at /test.php is diagnostic-only and stays off by default.
php_info_page = false
# Set proxy to one upstream URL, or a comma/space-separated upstream pool, to forward unknown local routes.
# Use off/false/no/0/none/null to disable it.
proxy = off
#proxy = http://127.0.0.1:9000 weight=3, http://127.0.0.1:9001 weight=1
# Choose how a pool picks its first target: round_robin, random, least_connections, or weighted.
#upstream_policy = round_robin
# Retry failed pooled upstream targets before a proxy response is committed.
# Set to 0 to disable retry attempts.
#upstream_retries = 1
# Passive health: eject an upstream after this many failed attempts, then retry it after the cooldown.
# Set upstream_max_failures = 0 to disable passive ejection.
#upstream_max_failures = 2
#upstream_fail_timeout_ms = 10000
# Active health checks are opt-in. Failed probes eject targets until a later probe recovers them.
#upstream_health_check = false
#upstream_health_check_path = /health
#upstream_health_check_interval_ms = 5000
#upstream_health_check_timeout_ms = 1000
# optional HTTP/2 cleartext tunnel target
#h2_upstream = http://127.0.0.1:9001
# native HTTP/3 default-page path over QUIC/TLS 1.3
#http3 = false
#http3_port = 8443

# Common Caddy/nginx-style response controls.
# Repeat header lines to add global headers to local Layerline responses.
#header = X-Frame-Options: DENY
#header = X-Content-Type-Options: nosniff
# Redirect syntax: redirect = FROM TO [301|302|303|307|308]
# FROM can end in * for prefix matching; suffix is appended to TO.
#redirect = /old /new 308
#redirect = /docs/* /documentation/ 308

# Named routes are the next config surface for route-local behavior.
# Syntax: route = NAME /path-or-prefix/* static|php|proxy
# Route-local settings inherit global defaults unless overridden.
#route = assets /assets/* static
#route_dir.assets = public
#route_index.assets = index.html
#route = app /app/* php
#route_php_root.app = public
#route_php_bin.app = /opt/homebrew/bin/php-cgi
#route = api /api/* proxy
#route_proxy.api = http://127.0.0.1:9000, http://127.0.0.1:9001
#route_upstream_policy.api = random

# Nginx-style domain configs live outside the main listener config.
# Enable this after placing .conf files in domains-enabled/.
#domain_config_dir = domains-enabled

# set tls=true only when fronting this server with HTTPS termination
#tls = false
tls_cert = /etc/ssl/certs/example.pem
tls_key = /etc/ssl/private/example.key
# optional automatic Let's Encrypt certbot settings (webroot mode)
#tls_auto = false
#letsencrypt_email = admin@example.com
#letsencrypt_domains = example.com,www.example.com
#letsencrypt_webroot = public/.well-known/acme-challenge
#letsencrypt_certbot = certbot
#letsencrypt_staging = false

# optional automatic Cloudflare DNS deployment
#cf_auto_deploy = false
#cf_api_base = https://api.cloudflare.com/client/v4
#cf_token = your-cloudflare-api-token
#cf_zone_id =
#cf_zone_name = example.com
#cf_record_name = www.example.com
#cf_record_type = A
#cf_record_content = 203.0.113.10
#cf_record_ttl = 300
#cf_record_proxied = false
#cf_record_comment = managed by Layerline

# max_concurrent_connections controls how many open socket handlers this process accepts at once.
# default in code: 1000000
#max_concurrent_connections = 1000000
# max_requests_per_connection controls how many HTTP requests are accepted on one TCP connection before forced close.
# set to 1 for strict request-per-connection traffic (often best for high concurrency density).
# default in code: 256
#max_requests_per_connection = 256
# worker_stack_size reduces per-thread memory footprint for high connection density.
# default in code: 65536
#worker_stack_size = 65536
# Socket timeout policy in milliseconds.
# Header timeout covers the first request and partial headers.
# Idle timeout covers waiting for the next keep-alive request.
# Body/write/upstream timeouts bound request bodies, client writes, and proxy IO.
# Graceful shutdown timeout is how long SIGINT/SIGTERM drain active connections.
#read_header_timeout_ms = 10000
#read_body_timeout_ms = 30000
#idle_timeout_ms = 60000
#write_timeout_ms = 30000
#upstream_timeout_ms = 30000
#upstream_retries = 1
#upstream_max_failures = 2
#upstream_fail_timeout_ms = 10000
#graceful_shutdown_timeout_ms = 10000
# max_php_output_bytes caps bytes captured from php-cgi output to avoid per-request memory spikes.
# default in code: 2097152
#max_php_output_bytes = 2097152

max_request_bytes = 16384
max_body_bytes = 1048576
max_static_file_bytes = 10485760
