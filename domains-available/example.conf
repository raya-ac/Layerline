# Copy this file into domains-enabled/ to load it from server.conf.
# The file name is the internal server name unless you set `name`.
name = example
server_name = example.com www.example.com
root = public
index = index.html
serve_static_root = true

# Uncomment these when this virtual host should present its own certificate.
# Layerline selects this pair by SNI before falling back to server.conf.
#tls_cert = /etc/letsencrypt/live/example.com/fullchain.pem
#tls_key = /etc/letsencrypt/live/example.com/privkey.pem

route = assets /assets/* static
route_dir.assets = public

route = app /app/* php
route_php_root.app = public
route_php_bin.app = /opt/homebrew/bin/php-cgi
#route_php_fastcgi.app = 127.0.0.1:9000
#route_php_index.app = index.php
#route_php_front_controller.app = true
#route_php_timeout_ms.app = 10000

# Unknown paths for this domain can fall back to a pool.
#proxy = http://127.0.0.1:9000, http://127.0.0.1:9001
#proxy_timeout_ms = 15000
#upstream_policy = round_robin
